 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кошки-мышки</title>
    <style>
      body {
          margin: 0;
          padding: 0;
          overflow: hidden;
          font-family: 'Arial', sans-serif;
          background-color: #70c5ce;
      }

      .game-container {
          width: 100vw;
          height: 100vh;
          position: relative;
          overflow: hidden;
      }

      .ui-container {
          position: absolute;
          top: 10px;
          left: 10px;
          z-index: 100;
          background-color: rgba(0, 0, 0, 0.5);
          padding: 10px;
          border-radius: 5px;
          color: white;
          font-size: 18px;
      }

      .hp-bar {
          width: 200px;
          height: 20px;
          background-color: #333;
          border-radius: 10px;
          margin-top: 5px;
          overflow: hidden;
      }

      .hp-fill {
          height: 100%;
          width: 100%;
          background-color: #e74c3c;
          transition: width 0.3s;
      }

      .game-world {
          width: 300%; /* Ширина игрового мира */
          height: 100vh;
          position: absolute;
          left: 0;
          top: 0;
          transition: transform 0.1s linear;
      }

      .background-layer {
          position: absolute;
          width: 300%;
          height: 100%;
          background-image: url("img/background/export/bgTest.svg");
          background-repeat: repeat-x;
          background-position: 0 bottom;
          background-size: auto;
          z-index: 1;
      }




      .player {
          position: absolute;
          height: 60px;
          width: 100px;
          background-image: url("img/mouse/idle/idle1.png");
          background-size: contain;
          background-repeat: no-repeat;
          z-index: 3;
          transition: transform 0.1s;
      }

      @keyframes mouse-idle {
        0% { background-image: url("img/mouse/idle/export/idle1-export.png"); }
        50% { background-image: url("img/mouse/idle/export/idle2-export.png"); }
        100% { background-image: url("img/mouse/idle/export/idle1-export.png");}
    }

    @keyframes mouse-run {
        0% { background-image: url("img/mouse/walk/export/walk1-export.png"); }
        33% { background-image: url("img/mouse/walk/export/walk2-export.png"); }
        67% { background-image: url("img/mouse/walk/export/walk3-export.png"); }
        100% { background-image: url("img/mouse/walk/export/walk4-export.png"); }
    }

    @keyframes mouse-jump {
        0% { background-image: url("img/mouse/jump/export/jump1-export.png"); }
        50% { background-image: url("img/mouse/jump/export/jump2-export.png"); }
        100% { background-image: url("img/mouse/jump/export/jump3-export.png"); }
    }

    .player.idle {
        animation: mouse-idle 0.6s steps(200) infinite;
    }

    .player.running {
        animation: mouse-run 0.5s steps(500) infinite;
    }

    .player.jumping {
        animation: mouse-jump 0.8s steps(300) forwards;
    }

      @keyframes cheese-disappear {
        0% {
            background-image: url("img/cheese/export/cheese1-export.png");
        }
        25%{
            background-image: url("img/cheese/export/cheese2-export.png");
        }
        50%{
            background-image: url("img/cheese/export/cheese3-export.png");
        }
        75%{
            background-image: url("img/cheese/export/cheese4-export.png");
        }
        100% {
            background-image: url("img/cheese/export/cheese5-export.png");
        }
    }

    .cheese {
        background-image: url("img/cheese/export/cheese1-export.png"); 
        background-size: cover;
        background-repeat: no-repeat;
        width: 50px;
        height: 50px;
        position: absolute;
        z-index: 3;
        transition: transform 0.3s, opacity 0.3s;
    }

    .cheese.disappearing {
        animation: cheese-disappear 0.5s forwards; /* Анимация исчезновения */
    }



      @keyframes cat-walk {
        0% { background-image: url("img/cats/cat_jump/walk-high/cat_walk1.png"); }
        15% { background-image: url("img/cats/cat_jump/walk-high/cat_walk2.png"); }
        30% { background-image: url("img/cats/cat_jump/walk-high/cat_walk3.png"); }
        45% { background-image: url("img/cats/cat_jump/walk-high/cat_walk4.png"); }
        55% { background-image: url("img/cats/cat_jump/walk-high/cat_walk5.png"); }
        70% { background-image: url("img/cats/cat_jump/walk-high/cat_walk6.png"); }
        85% { background-image: url("img/cats/cat_jump/walk-high/cat_walk7.png"); }
        100% { background-image: url("img/cats/cat_jump/walk-high/cat_walk8.png"); }
    }

    @keyframes cat-safe {
        0% { background-image: url("img/cats/cat_jump/jump-high/cat_jump1.png");opacity: 1; }
        15% { background-image: url("img/cats/cat_jump/jump-high/cat_jump2.png");opacity: 0.75; }
        30% { background-image: url("img/cats/cat_jump/jump-high/cat_jump3.png");opacity: 0.75; }
        45% { background-image: url("img/cats/cat_jump/jump-high/cat_jump4.png");opacity: 0.5; }
        55% { background-image: url("img/cats/cat_jump/jump-high/cat_jump5.png");opacity: 0.5; }
        70% { background-image: url("img/cats/cat_jump/jump-high/cat_jump6.png");opacity: 0.75; }
        85% { background-image: url("img/cats/cat_jump/jump-high/cat_jump7.png");opacity: 0.75; }
        100% { background-image: url("img/cats/cat_jump/jump-high/cat_jump8.png");opacity: 1; }
    }

    .cat {
        position: absolute;
        width: 180px;
        height: 180px;
        background-size: contain;
        background-repeat: no-repeat;
        z-index: 2; /* Коты должны быть над фоном, но под мышкой */
        transition: left 0.1s linear; /* Плавное перемещение */
    }

    .cat.walking {
        animation: cat-walk 1s steps(8) infinite; /* Анимация ходьбы */
    }

    .cat.safe {
        animation: cat-safe 1s infinite; /* Анимация безопасного состояния */
    }



    .no-interaction {
            pointer-events: none !important; /* Отключает взаимодействие с элементами */
            overflow: hidden !important; /* Отключает прокрутку */
        }

    .no-interaction * {
            pointer-events: none !important; /* Отключает взаимодействие с дочерними элементами */
        }


        .modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.modal-content {
    background-color: white;
    padding: 100%;
    border-radius: 10px;
    text-align: center;
    width: 60%;
    max-width: 500px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
}

.modal-content h2 {
    margin: 0 0 10px;
    font-size: 24px;
}

.modal-content p {
    margin: 10px 0;
    font-size: 18px;
}

.modal-content button {
    padding: 10px 20px;
    font-size: 16px;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.modal-content button:hover {
    background-color: #0056b3;
}

.hidden {
    display: none;
}
    </style>
</head>
<body>
    <div class="game-container">

        <audio id="backgroundMusic" loop><source src="music/Three Red Hearts - Penguin Town.ogg" type="audio/ogg"></audio>

        <div class="ui-container">
            <div>HP: <span id="hp-value">100</span></div>
            <div class="hp-bar">
                <div class="hp-fill" id="hp-fill"></div>
            </div>
            <div>Сыр: <span id="cheese-count">0</span></div>
            <div>Время: <span id="time">00:00</span></div>
        </div>

        <div class="game-world" id="game-world">
            <div class="background-layer"></div>
            <div class="player" id="player"></div>
        </div>
    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h2>Игра окончена!</h2>
            <p id="modal-results"></p>
            <button id="restart-button">Начать заново</button>
        </div>
    </div>

    <div id="pause-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Пауза</h2>
            <button id="resume-button">Продолжить</button>
        </div>
    </div>
    <script>

let hasPlayedVideo = false; // Флаг, чтобы отслеживать, было ли проиграно видео
//музыка

        document.addEventListener('DOMContentLoaded', function() {
    var music = document.getElementById('backgroundMusic');
    // Устанавливаем громкость на 70%
    backgroundMusic.volume = 0.7;
    // Функция для начала воспроизведения
    function playMusic() {
        if (music.paused) {// Проверяем, была ли музыка уже запущена
            var promise = music.play(); // Запускаем воспроизведение
            if (promise !== undefined) {// Обрабатываем возможные ошибки автовоспроизведения
                promise.then(_ => {
                }).catch(error => {
                    console.log("Autoplay prevented: " + error);
                });
            }
        }
    }

    // ждем взаимодействия пользователя 
    document.addEventListener('click', playMusic);
    document.addEventListener('keydown', playMusic);
});

      const gameWorld = document.getElementById('game-world');
      const player = document.getElementById('player');
      const hpValue = document.getElementById('hp-value');
      const hpFill = document.getElementById('hp-fill');
      const cheeseCountDisplay = document.getElementById('cheese-count');
      const timeDisplay = document.getElementById('time');

      let playerX = 100;
      let playerY = 95; // Начальная позиция игрока
      let scrollX = 0;
      let isMovingRight = false;
      let isMovingLeft = false;
      let isJumping = false;
      let jumpVelocity = 0;
      const gravity = 0.4;
      let hp = 100;
      let cheeseCount = 0;
      let seconds = 0;

      const worldWidth = 3 * window.innerWidth;
      const groundHeight = 95; // Высота земли
      const catY = 90; // ВЫСОТА ДЛЯ КОТА

      const cheeseWidth = 50;
      const cheeseHeight = 50;
      const cheeses = [];
      let gameTimer;
      let cheeseTimerId; // ID таймера для генерации сыра

      const cats = [];
      const catSafeTime = 1000; // 1 секунду
      const catSpeed = 5; // Скорость котов
      let catDirection = []; // Направление движения каждого кота


      function createCat(x) {
        const cat = document.createElement('div');
        cat.classList.add('cat', 'walking'); // Добавляем класс для анимации ходьбы
        cat.style.left = `${x}px`;
        cat.style.bottom = `${catY}px`;
        cat.safe = false;
        cat.safeTimer = 0;
        cat.startX = x; // Запоминаем начальную позицию кота
        cat.maxX = x + 250; // Максимальная позиция кота
        cat.minX = x - 250; // Минимальная позиция кота
        gameWorld.appendChild(cat);
        cats.push(cat);
        catDirection.push(1); // Направление: 1 - вправо, -1 - влево
        return cat;
        }

        function initGame() {
            updateHpDisplay();
            updateTimeDisplay();
            updatePlayerPosition(); // Устанавливаем начальную позицию игрока

            document.addEventListener('keydown', handleKeyDown);
            document.addEventListener('keyup', handleKeyUp);

            startGameTimer();
            generateCheese();
            generateCat(); // Начинаем генерацию котов
            requestAnimationFrame(gameLoop);
        }

      function handleKeyDown(e) {
            switch (e.key) {
                case 'ArrowRight':
                    isMovingRight = true;
                    player.style.transform = 'scaleX(1)';
                    break;
                case 'ArrowLeft':
                    isMovingLeft = true;
                    player.style.transform = 'scaleX(-1)';
                    break;
                case ' ': // Пробел для прыжка
                    jump();
                    const jump_music = new Audio('music/jump.mp3');
                    jump_music.play();
                    break;
                case 'Escape': // Пауза
                    togglePause();
                    break;
                case 'k': // Завершение игры
                    endGame();
                    break;
            }
        }

      function jump() {
          if (!isJumping && playerY === groundHeight) { // Прыжок только с земли
              isJumping = true;
             
              jumpVelocity = 16; // Увеличена начальная скорость прыжка
          }
          
      }

      function handleKeyUp(e) {
        switch (e.key) {
            case 'ArrowRight':
                isMovingRight = false;
                break;
            case 'ArrowLeft':
                isMovingLeft = false;
                break;
        }
       }


       function Pause() {
          if (gameTimer) {
              clearInterval(gameTimer);
              gameTimer = null;

              // Останавливаем генерацию сыра
              clearTimeout(cheeseTimerId);
          } else {
              startGameTimer();
              generateCheese(); // Возобновляем генерацию сыра
              requestAnimationFrame(gameLoop);
          }
      }


       function togglePause() {
            const pauseModal = document.getElementById('pause-modal');
            const modal = document.getElementById('modal');

            // Проверяем, завершена ли игра
            if (!modal.classList.contains('hidden')) {
                return; // Если окно конца игры открыто, не показываем окно паузы
            }

            if (gameTimer) {
                clearInterval(gameTimer);
                gameTimer = null;

                // Останавливаем генерацию сыра
                clearTimeout(cheeseTimerId);

                // Показываем окно паузы
                pauseModal.classList.remove('hidden');
            } else {
                // Скрываем окно паузы
                pauseModal.classList.add('hidden');

                // Возобновляем игру
                startGameTimer();
                generateCheese(); // Возобновляем генерацию сыра
                requestAnimationFrame(gameLoop);
            }
        }
        document.getElementById('resume-button').addEventListener('click', () => {
            togglePause(); // Возобновляем игру
        });

      function startGameTimer() {
          gameTimer = setInterval(() => {
              hp = Math.max(0, hp - 1);
              updateHpDisplay();
              seconds++;
              updateTimeDisplay();

              if (hp <= 0) {
                  endGame();
              }
          }, 1000);
      }

      function updateHpDisplay() {
          hpValue.textContent = hp;
          hpFill.style.width = `${hp}%`;

          if (hp < 30) {
              hpFill.style.backgroundColor = '#ff0000';
          } else if (hp < 60) {
              hpFill.style.backgroundColor = '#f39c12';
          } else {
              hpFill.style.backgroundColor = '#2ecc71';
          }
      }

      function updateTimeDisplay() {
          const minutes = Math.floor(seconds / 60);
          const secs = seconds % 60;
          timeDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      }

      function endGame() {
            backgroundMusic.volume = 0;
            const end_music = new Audio('music/gameover.mp3');
            end_music.play();
            clearInterval(gameTimer);   
            Pause();
            // Останавливаем генерацию сыра
            clearTimeout(cheeseTimerId);

            // Блокируем взаимодействие с игрой
            const gameContainer = document.querySelector('.game-container');
            gameContainer.classList.add('no-interaction');

            // Заполняем модальное окно результатами
            const modal = document.getElementById('modal');
            const modalResults = document.getElementById('modal-results');
            modalResults.textContent = `Ваш результат: ${seconds} секунд, ${cheeseCount} сыра`;
            modal.classList.remove('hidden');

            // Добавляем обработчик для кнопки "Начать заново"
            const restartButton = document.getElementById('restart-button');
            restartButton.addEventListener('click', () => {
                location.reload(); // Перезагружаем страницу для начала новой игры
            });
        }

      function updatePlayerPosition() {
        if (isJumping) {
            playerY += jumpVelocity;  // playerY уменьшается, т.к. bottom увеличивается при движении вверх
            jumpVelocity -= gravity; // jumpVelocity уменьшается, пока не станет <= 0

            if (playerY <= groundHeight) {
                playerY = groundHeight;
                isJumping = false;
                jumpVelocity = 0;
            }

            // Устанавливаем анимацию прыжка
            player.classList.remove('idle', 'running');
            player.classList.add('jumping');
        } else if (isMovingRight || isMovingLeft) {
            // Устанавливаем анимацию бега
            player.classList.remove('idle', 'jumping');
            player.classList.add('running');
        } else {
            // Устанавливаем анимацию стояния
            player.classList.remove('running', 'jumping');
            player.classList.add('idle');
        }

        player.style.left = `${playerX}px`;
        player.style.bottom = `${playerY}px`;  // Обновляем bottom
        const screenCenter = window.innerWidth / 2;
        if (playerX > screenCenter && playerX < worldWidth - screenCenter) {
            scrollX = playerX - screenCenter;
            gameWorld.style.transform = `translateX(-${scrollX}px)`;
        }
      }

      function generateCheese() {
            const maxX = worldWidth - cheeseWidth;
            const minY = 80; // Минимальная высота для сыра
            const maxY = 300; // Максимальная высота для сыра

            const newCheese = document.createElement('div');
            newCheese.classList.add('cheese');
            const cheeseX = Math.random() * maxX;
            const cheeseY = minY + Math.random() * (maxY - minY);

            newCheese.style.left = `${cheeseX}px`;
            newCheese.style.bottom = `${cheeseY}px`;

            // Проверяем, чтобы сыр не создавался за пределами игрового мира
            if (cheeseX >= 0 && cheeseX <= maxX && cheeseY >= minY && cheeseY <= maxY) {
                gameWorld.appendChild(newCheese);
                cheeses.push(newCheese);
            }

            // Сохраняем ID таймера
            cheeseTimerId = setTimeout(generateCheese, Math.random() * 5000 + 1000); // от 1 до 6 секунд
        }

        function generateCat() {
    const maxX = worldWidth - 120; // Учитываем ширину кота
    const playerScreenLeft = scrollX; // Левая граница видимой области
    const playerScreenRight = scrollX + window.innerWidth; // Правая граница видимой области

    let catX;

    // Генерируем координаты кота на расстоянии более 300px от игрока
    do {
        catX = Math.random() * maxX; // Рандомная позиция по X
    } while (
        Math.abs(catX - playerX) < 500 // Проверяем, чтобы кот был на расстоянии более 300px от игрока
    );

    const newCat = document.createElement('div');
    newCat.classList.add('cat', 'walking'); // Класс для анимации ходьбы
    newCat.style.left = `${catX}px`;
    newCat.style.bottom = `${catY}px`; // Высота кота фиксирована
    newCat.safe = false;
    newCat.safeTimer = 0;
    newCat.startX = catX;
    newCat.maxX = catX + 250; // Максимальная позиция кота
    newCat.minX = catX - 250; // Минимальная позиция кота

    gameWorld.appendChild(newCat);
    cats.push(newCat);
    catDirection.push(1); // Направление: 1 - вправо, -1 - влево

    // Удаляем кота через 5 секунд
    setTimeout(() => {
        const index = cats.indexOf(newCat);
        if (index !== -1) {
            cats.splice(index, 1); // Удаляем кота из массива
            newCat.remove(); // Удаляем кота из DOM
        }
    }, 10000);

    // Сохраняем ID таймера для следующей генерации
    setTimeout(generateCat, Math.random() * 5000 + 2000); // Генерация каждые 2-7 секунд
}
        
      function checkCollision(rect1, rect2) {
          return (
              rect1.left < rect2.right &&
              rect1.right > rect2.left &&
              rect1.top < rect2.bottom &&
              rect1.bottom > rect2.top
          );
      }


      
      function gameLoop() {
          if (!gameTimer) return;

          // Движение
          if (isMovingRight) playerX += 7.5;
          if (isMovingLeft) playerX -= 7.5;
          playerX = Math.max(0, Math.min(worldWidth - player.offsetWidth, playerX));

        updatePlayerPosition();

        // Проверка столкновений с сыром
        const playerRect = {
            left: playerX,
            top: playerY,
            right: playerX + player.offsetWidth,
            bottom: playerY + player.offsetHeight
        };

       // Проверка столкновений с сыром (Используем обычный цикл for, чтобы безопасно удалять элементы)
for (let i = cheeses.length - 1; i >= 0; i--) {
    const cheese = cheeses[i];

    if (cheese.classList.contains('disappearing')) continue;

    const cheeseX = parseFloat(cheese.style.left);
    const cheeseY = parseFloat(cheese.style.bottom);

    const cheeseRect = {
        left: cheeseX,
        top: cheeseY,
        right: cheeseX + cheeseWidth,
        bottom: cheeseY + cheeseHeight
    };
    if (checkCollision(playerRect, cheeseRect)) {

        const cheese_music = new Audio('music/cheese.mp3');
        cheese_music.play();

        cheeseCount++;
        cheeseCountDisplay.textContent = cheeseCount;

        cheese.classList.add('disappearing');
        hp = Math.min(100, hp + 10);

        updateHpDisplay();

        setTimeout(() => {
            cheese.remove();
            cheeses.splice(i, 1);
        }, 500);

        if (cheeseCount >= 20) {
            endGame();
        }
    }
}

    
// Обновление позиции котов
cats.forEach((cat, index) => {
    const catRect = cat.getBoundingClientRect();

    // Логика движения котов (остается без изменений)
    let dx = catSpeed * catDirection[index];
    let newLeft = parseInt(cat.style.left) + dx;

    if (newLeft >= cat.maxX) {
        newLeft = cat.maxX;
        catDirection[index] = -1;
        cat.style.transform = 'scaleX(-1)';
    } else if (newLeft <= cat.minX) {
        newLeft = cat.minX;
        catDirection[index] = 1;
        cat.style.transform = 'scaleX(1)';
    }

    cat.style.left = `${newLeft}px`;

    const playerRect = player.getBoundingClientRect();
    // Проверка столкновения с игроком
    if (checkCollision(playerRect, catRect)) {
        if (!cat.safe) {  // Проверяем, находится ли кот в "безопасном" состоянии
            const cat_music = new Audio('music/meowrgh.mp3');
            cat_music.play();
            hp -= 30;
            updateHpDisplay();
            cat.classList.remove('walking'); // Дополнительная предосторожность
            cat.classList.add('safe');
            cat.safe = true;
            cat.safeTimer = 0; // Сбрасываем таймер
        }
    }

    // Обновляем safeTimer
    if (cat.safe) {
        cat.safeTimer += 16.67; // Увеличиваем таймер

        if (cat.safeTimer >= catSafeTime) {  // Проверяем, достаточно ли времени прошло
            cat.classList.remove('safe');
            cat.classList.add('walking');  // Возвращаем класс 'walking'
            cat.safe = false;
            cat.safeTimer = 0; // Сбрасываем таймер (хотя это и не обязательно)
        }
    }
});






    requestAnimationFrame(gameLoop);
    } 

window.addEventListener('load', initGame);


</script>
